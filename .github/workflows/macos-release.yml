name: Release macOS App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build app bundle
        run: ./HighlightBar/scripts/build-app.sh

      - name: Zip app bundle
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "HighlightBar/dist/HighlightBar.app" "artifacts/HighlightBar-macos.zip"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || gh release create "${{ github.ref_name }}" --generate-notes
          gh release upload "${{ github.ref_name }}" "artifacts/HighlightBar-macos.zip" --clobber
