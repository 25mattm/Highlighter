name: Build Windows App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "WindowsHighlightBar/**"
      - ".github/workflows/windows-build.yml"
  pull_request:
    paths:
      - "WindowsHighlightBar/**"
      - ".github/workflows/windows-build.yml"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Publish win-x64 app
        run: >
          dotnet publish WindowsHighlightBar/HighlightBar.Windows.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -o publish/win-x64

      - name: Zip output
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath publish/HighlightBar-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: HighlightBar-windows-x64
          path: publish/HighlightBar-windows-x64.zip
